# ============================================================
# GemmaEdge Sovereign Configuration Matrix (Production-Ready)
# ============================================================

engine:
  # Absolute path to the local vector engine model snapshot
  model_path: "C:\\Users\\DrSulxX\\.cache\\huggingface\\hub\\models--sentence-transformers--all-MiniLM-L6-v2\\snapshots\\1110a243fdf4706b3f48f1d95db1a4f5529b4d41"
  device: "cpu"
  # Keep the system offline for security and privacy
  offline_mode: true

router:
  # Similarity threshold for personality triggering
  threshold: 0.30
  max_weight: 0.95
  mean_weight: 0.05
  # Path to the JSON personality matrix
  matrix_path: "router/personality_matrix.json"

personalities:
  # Mapping of logical keys to official Ollama model names
  main_core: "misha-maincore"
  sovereign: "misha-sovereign"
  reasoning: "misha-reasoning"
  auditor: "misha-auditor"
  social: "misha-social"
  oracle: "misha-oracle"

hardware:
  # GPU memory constraints in GB (GTX 1050 Ti optimized)
  gpu_vram_limit: 4.0
  # Cold-swap setting: 0 = immediate purge, >0 = keep-alive in seconds
  keep_alive: 0

api:
  # Backend server host and port settings
  host: "127.0.0.1"
  port: 8000
  # Hot-reload for code changes (keep false for production/VRAM stability)
  reload: false
  # Number of Uvicorn worker processes
  workers: 1

logging:
  # Standard Uvicorn log level (info, debug, warning, error, critical)
  log_level: "info"
  # Internal framework engine toggle required by application lifespan startup trace
  debug_enabled: false

frontend:
  # Streamlit dashboard port
  port: 8501
  # Headless execution: true = don't open browser, false = auto-open browser
  headless: false
